server {
  listen 80;
  server_name sokolovroman.ru www.sokolovroman.ru;

  root /var/www/sokolovroman.ru/dist;
  index index.html;
  add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

  # Keep service files directly accessible.
  location = /robots.txt {
    try_files $uri =404;
  }

  location = /sitemap.xml {
    try_files $uri =404;
  }

  # Cache static assets aggressively.
  location ~* \.(?:js|css|svg|png|jpg|jpeg|webp|avif|gif|mp4|woff2?)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    access_log off;
  }

  # SPA fallback for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
