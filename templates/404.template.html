<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
  </head>
  <body>
    <script>
      (function () {
        var repoBase = "__BASE_PATH__";
        var path = window.location.pathname.startsWith(repoBase)
          ? window.location.pathname.slice(repoBase.length)
          : window.location.pathname;
        var target = repoBase + "/?p=" + encodeURIComponent(path + window.location.search + window.location.hash);
        window.location.replace(window.location.origin + target);
      })();
    </script>
  </body>
</html>
